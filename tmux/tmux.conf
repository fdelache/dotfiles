# Pi workspace tmux config
# Minimal config focused on making task switching ergonomic.

# ── General ────────────────────────────────────────────────────────
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g history-limit 10000

# ── Status bar ─────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#888888"

# Left: session name
set -g status-left "#[fg=#8888ff,bold] π #[fg=#666666]│ "
set -g status-left-length 20

# Right: minimal
set -g status-right "#[fg=#666666]%H:%M"
set -g status-right-length 20

# Window tabs — the key UX element
set -g window-status-format "#[fg=#666666] #I:#W "
set -g window-status-current-format "#[fg=#88ccff,bold] #I:#W "
set -g window-status-separator "#[fg=#444444]│"

# ── Keybindings ────────────────────────────────────────────────────
# Ctrl-b 0-9 already works for switching windows

# Quick jump to first window (dashboard/main)
bind Space select-window -t 0

# Window navigation with arrow keys
bind Left previous-window
bind Right next-window

# ── Window management ──────────────────────────────────────────────
# Renumber windows when one is closed (keep indices clean)
set -g renumber-windows on
